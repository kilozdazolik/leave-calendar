<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Leave Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <span class="navbar-brand fw-bold">Team Leave Calendar</span>
</nav>

<div class="container">

    <ul class="nav nav-tabs mb-4" id="mainTabs">
        <li class="nav-item">
            <button class="nav-link active" data-tab="leave-requests">Leave Requests</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-tab="new-request">New Request</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-tab="on-call">On-Call Schedule</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-tab="calendar-view">Month View</button>
        </li>
    </ul>

    <section id="leave-requests" class="tab-content">
        <div class="d-flex gap-2 mb-3">
            <label for="filter-member" class="visually-hidden">Filter by Member</label>
            <select id="filter-member" class="form-select w-auto">
                <option value="">All Members</option>
            </select>

            <label for="filter-status" class="visually-hidden">Filter by Status</label>
            <select id="filter-status" class="form-select w-auto">
                <option value="">All Statuses</option>
                <option value="PENDING">Pending</option>
                <option value="APPROVED">Approved</option>
                <option value="REJECTED">Rejected</option>
            </select>

            <button class="btn btn-dark" onclick="applyFilters()">Filter</button>
            <button class="btn btn-outline-secondary" onclick="clearFilters()">Clear</button>
        </div>
        <div id="leave-requests-container"></div>
    </section>

    <section id="new-request" class="tab-content d-none">
        <div class="card shadow-sm" style="max-width: 500px;">
            <div class="card-body">
                <h5 class="card-title mb-4">New Leave Request</h5>
                <div id="form-error" class="alert alert-danger d-none"></div>
                <form id="leave-form">
                    <div class="mb-3">
                        <label for="member-select" class="form-label">Team Member</label>
                        <select id="member-select" class="form-select" required></select>
                    </div>
                    <div class="mb-3">
                        <label for="start-date" class="form-label">Start Date</label>
                        <input type="date" id="start-date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="end-date" class="form-label">End Date</label>
                        <input type="date" id="end-date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="reason" class="form-label">Reason</label>
                        <textarea id="reason" class="form-control" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Submit Request</button>
                </form>
            </div>
        </div>
    </section>

    <section id="on-call" class="tab-content d-none">
        <div id="on-call-container"></div>
    </section>

    <section id="calendar-view" class="tab-content d-none">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-outline-dark" onclick="changeMonth(-1)">&lt; Prev</button>
            <h4 id="calendar-month-label" class="mb-0"></h4>
            <button class="btn btn-outline-dark" onclick="changeMonth(1)">Next &gt;</button>
        </div>

        <div class="calendar-grid bg-white shadow-sm rounded border">
            <div class="fw-bold text-center py-2 border-bottom">Mon</div>
            <div class="fw-bold text-center py-2 border-bottom">Tue</div>
            <div class="fw-bold text-center py-2 border-bottom">Wed</div>
            <div class="fw-bold text-center py-2 border-bottom">Thu</div>
            <div class="fw-bold text-center py-2 border-bottom">Fri</div>
            <div class="fw-bold text-center py-2 border-bottom text-muted">Sat</div>
            <div class="fw-bold text-center py-2 border-bottom text-muted">Sun</div>

            <div id="calendar-days" class="contents"></div>
        </div>
    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
